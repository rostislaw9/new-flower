services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flower}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flower_secret}
      POSTGRES_DB: ${POSTGRES_DB:-flower_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-flower} -d ${POSTGRES_DB:-flower_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-flower}:${POSTGRES_PASSWORD:-flower_secret}@postgres:5432/${POSTGRES_DB:-flower_db}
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ARTIST_EMAIL: ${ARTIST_EMAIL:-artist@newflower.tattoo}
      EMAIL_FROM: ${EMAIL_FROM:-New Flower Tattoo <noreply@newflower.tattoo>}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
